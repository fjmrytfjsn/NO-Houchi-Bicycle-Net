openapi: 3.0.3
info:
  title: Owner Web API
  version: "1.0.0"
  description: "API for owner (QR-access) flow: temporary unlock -> final unlock"
paths:
  /owner/markers/{code}:
    get:
      summary: Get marker and latest report + declaration
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnerMarkerResponse'
        '404':
          description: Marker not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /owner/markers/{code}/unlock-temp:
    post:
      summary: Create temporary unlock (仮解除)
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        '200':
          description: Temporary unlock created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemporaryUnlockResponse'
  /owner/markers/{code}/unlock-final:
    post:
      summary: Finalize unlock (本解除) - allowed after eligibleFinalAt
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeRequest'
      responses:
        '200':
          description: Finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        '400':
          description: Not eligible yet
components:
  schemas:
    OwnerMarkerResponse:
      type: object
      properties:
        marker:
          type: object
          properties:
            code:
              type: string
        report:
          allOf:
            - $ref: '#/components/schemas/BicycleReport'
          nullable: true
        declaration:
          $ref: '#/components/schemas/Declaration'
    BicycleReport:
      type: object
      properties:
        id:
          type: string
        markerId:
          type: string
        imageUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        identifierText:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Declaration:
      type: object
      properties:
        id:
          type: string
        markerId:
          type: string
        declaredAt:
          type: string
          format: date-time
        eligibleFinalAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        finalizedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      nullable: true
    TemporaryUnlockResponse:
      type: object
      properties:
        declaredAt:
          type: string
          format: date-time
        eligibleFinalAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        status:
          type: string
          example: temporary
    FinalizeResponse:
      type: object
      properties:
        finalizedAt:
          type: string
          format: date-time
        status:
          type: string
          example: resolved
        message:
          type: string
        coupon:
          type: object
          nullable: true
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type: string
            shopName:
              type: string
            discount:
              type: number
            discountType:
              type: string
            expiresAt:
              type: string
              format: date-time
    FinalizeRequest:
      type: object
      required:
        - scannedCode
      properties:
        scannedCode:
          type: string
        ownerEmail:
          type: string
          format: email
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
